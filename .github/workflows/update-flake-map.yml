name: Update Flake Map in README

on:
  push:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/update-flake-map.yml'
      - '.github/scripts/update-readme.py'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Generate and update README
        run: |
          nix run nixpkgs#python3 -- .github/scripts/update-readme.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update flake map in README"
          file_pattern: README.md
