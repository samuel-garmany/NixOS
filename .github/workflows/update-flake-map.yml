name: Update Flake Map in README

on:
  push:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'hosts/**'
      - 'modules/**'
      - '.github/workflows/update-flake-map.yml'
      - '.github/scripts/update-readme.py'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix run nixpkgs#python3 -- .github/scripts/update-readme.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply automated changes
